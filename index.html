<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFHL API Tester</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #047857;
      --error: #b91c1c;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      width: min(1040px, 94vw);
      margin: 28px auto 36px;
      display: grid;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
      padding: 20px;
    }

    h1, h2, h3 {
      margin: 0 0 10px;
    }

    h1 {
      font-size: 1.5rem;
    }

    h2 {
      font-size: 1.28rem;
    }

    h3 {
      font-size: 1.02rem;
    }

    .subtle {
      color: var(--muted);
      margin-top: 2px;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 0.95rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Courier New", monospace;
      outline: none;
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font-weight: 600;
      padding: 10px 16px;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 500;
    }

    .error {
      color: var(--error);
      font-weight: 600;
      margin-top: 10px;
    }

    .success {
      color: var(--success);
      font-weight: 600;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-top: 12px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fafbff;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .stat-value {
      margin-top: 2px;
      font-size: 1.02rem;
      font-weight: 700;
      word-break: break-word;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .chip {
      border: 1px solid var(--border);
      background: #f8fafc;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.85rem;
    }

    .tree-wrap {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fcfdff;
    }

    .tree-wrap ul {
      margin: 0;
      padding-left: 18px;
      list-style: disc;
    }

    .tree-wrap li {
      margin: 3px 0;
    }

    .response-section {
      margin-top: 16px;
    }

    .section-title {
      margin: 0 0 8px;
    }

    .hierarchy-list {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .hierarchy-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      padding: 14px;
    }

    .hierarchy-header {
      margin-bottom: 8px;
      font-weight: 700;
    }

    .meta-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      margin-bottom: 8px;
    }

    .meta-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fafbff;
    }

    .meta-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .meta-value {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>BFHL API Tester</h1>
      <p class="subtle">Enter edges like <code>A-&gt;B</code>, separated by commas, spaces, or new lines.</p>

      <textarea id="edgesInput" placeholder="A->B
B->C
D->E"></textarea>

      <div class="actions">
        <button id="submitBtn" type="button">Submit to /bfhl</button>
        <span id="status" class="status">Ready</span>
      </div>

      <div id="feedback"></div>
    </section>

    <section class="card">
      <h2>Response</h2>
      <div id="result" class="empty">No response yet. Submit data to see results.</div>
    </section>
  </main>

  <script>
    const edgesInput = document.getElementById("edgesInput");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");
    const feedbackEl = document.getElementById("feedback");
    const resultEl = document.getElementById("result");

    function tokenizeEdges(raw) {
      return raw
        .split(/[\n,\s]+/)
        .map((token) => token.trim())
        .filter(Boolean);
    }

    function createTreeList(nodeMap) {
      const entries = Object.entries(nodeMap);
      if (!entries.length) return "<span class='empty'>No tree nodes</span>";

      function renderNode(name, childrenObj) {
        const children = Object.entries(childrenObj);
        if (!children.length) return `<li><strong>${name}</strong></li>`;
        return `<li><strong>${name}</strong><ul>${children.map(([child, sub]) => renderNode(child, sub)).join("")}</ul></li>`;
      }

      return `<ul>${entries.map(([root, children]) => renderNode(root, children)).join("")}</ul>`;
    }

    function renderListChips(items, emptyText) {
      if (!items || items.length === 0) return `<span class="empty">${emptyText}</span>`;
      return `<div class="chips">${items.map((item) => `<span class="chip">${item}</span>`).join("")}</div>`;
    }

    function renderResponse(data) {
      const summary = data.summary || {};
      const hierarchies = Array.isArray(data.hierarchies) ? data.hierarchies : [];

      const hierarchyCards = hierarchies.length
        ? hierarchies.map((h, idx) => `
            <article class="hierarchy-card">
              <div class="hierarchy-header">Hierarchy ${idx + 1}: Root ${h.root || "-"}</div>
              <div class="meta-grid">
                <div class="meta-item">
                  <div class="meta-label">Has Cycle</div>
                  <div class="meta-value">${h.has_cycle ? "Yes" : "No"}</div>
                </div>
                <div class="meta-item">
                  <div class="meta-label">Depth</div>
                  <div class="meta-value">${h.depth || 0}</div>
                </div>
              </div>
              <div class="tree-wrap">
                ${h.has_cycle ? "<span class='empty'>Cycle detected - tree view unavailable.</span>" : createTreeList(h.tree || {})}
              </div>
            </article>
          `).join("")
        : "<p class='empty'>No hierarchies returned.</p>";

      resultEl.classList.remove("empty");
      resultEl.innerHTML = `
        <div class="grid">
          <div class="stat">
            <div class="stat-label">User ID</div>
            <div class="stat-value">${data.user_id || "-"}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Email</div>
            <div class="stat-value">${data.email_id || "-"}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Roll Number</div>
            <div class="stat-value">${data.college_roll_number || "-"}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total Trees</div>
            <div class="stat-value">${summary.total_trees ?? 0}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Total Cycles</div>
            <div class="stat-value">${summary.total_cycles ?? 0}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Largest Tree Root</div>
            <div class="stat-value">${summary.largest_tree_root || "-"}</div>
          </div>
        </div>

        <section class="response-section">
          <h3 class="section-title">Invalid Entries</h3>
          ${renderListChips(data.invalid_entries, "No invalid entries")}
        </section>

        <section class="response-section">
          <h3 class="section-title">Duplicate Edges</h3>
          ${renderListChips(data.duplicate_edges, "No duplicate edges")}
        </section>

        <section class="response-section">
          <h3 class="section-title">Hierarchies</h3>
          <div class="hierarchy-list">
            ${hierarchyCards}
          </div>
        </section>
      `;
    }

    async function submitData() {
      const edges = tokenizeEdges(edgesInput.value);
      feedbackEl.innerHTML = "";

      if (!edges.length) {
        feedbackEl.innerHTML = "<div class='error'>Please enter at least one edge before submitting.</div>";
        return;
      }

      submitBtn.disabled = true;
      statusEl.textContent = "Submitting...";

      try {
        const response = await fetch("https://bfhl-project-a9ea.onrender.com/bfhl", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ data: edges })
        });

        let payload;
        try {
          payload = await response.json();
        } catch (_error) {
          payload = null;
        }

        if (!response.ok) {
          const msg = payload && payload.error ? payload.error : `Request failed with status ${response.status}`;
          throw new Error(msg);
        }

        renderResponse(payload);
        feedbackEl.innerHTML = "<div class='success'>API call successful.</div>";
        statusEl.textContent = "Completed";
      } catch (error) {
        resultEl.classList.add("empty");
        resultEl.textContent = "No valid response to display.";
        feedbackEl.innerHTML = `<div class='error'>API call failed: ${error.message}</div>`;
        statusEl.textContent = "Failed";
      } finally {
        submitBtn.disabled = false;
      }
    }

    submitBtn.addEventListener("click", submitData);
  </script>
</body>
</html>
